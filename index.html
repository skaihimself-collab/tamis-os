<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TAMIS OS">
<meta name="theme-color" content="#f5f4f0">
<title>TAMIS OS</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#f5f4f0;--bg2:#eceae4;--bg3:#e2e0d8;--fg:#1a1814;--fg2:#5a5750;--fg3:#9a9790;--border:#d4d2ca;--border2:#c4c2ba;--danger:#c0392b;--success:#27ae60;--warn:#e67e22;--info:#2980b9;--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--r:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);min-height:100vh;overscroll-behavior:none;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
textarea,input,button{font-family:var(--sans);}
textarea{resize:none;outline:none;}input{outline:none;}button{cursor:pointer;border:none;background:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* TOAST */
#toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;display:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 4px 20px rgba(0,0,0,.15);}
#toast.show{display:block;animation:fadeIn .2s ease;}
#offline-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--warn);color:#fff;text-align:center;padding:8px;font-size:12px;font-weight:500;z-index:100;}
#offline-bar.show{display:block;}

/* SETUP */
#setup{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:200;}
#setup.hidden{display:none;}
.setup-title{font-family:var(--serif);font-size:42px;margin-bottom:4px;}
.setup-sub{font-size:12px;color:var(--fg3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:40px;}
.setup-card{width:100%;max-width:400px;background:#fff;border-radius:12px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.08);}
.setup-label{font-size:12px;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.setup-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--fg);padding:12px 14px;font-size:14px;margin-bottom:8px;transition:border-color .15s;}
.setup-input:focus{border-color:var(--fg);}
.setup-hint{font-size:12px;color:var(--fg3);line-height:1.6;margin-bottom:20px;}
.setup-btn{width:100%;background:var(--fg);color:var(--bg);border-radius:var(--r);padding:13px;font-size:14px;font-weight:600;}
#setup-error{font-size:12px;color:var(--danger);margin-top:10px;text-align:center;min-height:18px;}

/* HEADER */
#header{background:var(--bg);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:50;padding:0 16px;}
.header-top{display:flex;align-items:center;justify-content:space-between;height:54px;}
.brand{font-family:var(--serif);font-size:26px;}
.lang-bar{display:flex;gap:2px;}
.lang-btn{background:transparent;color:var(--fg3);padding:5px 8px;font-size:11px;font-weight:600;border-radius:6px;transition:all .15s;}
.lang-btn.active{background:var(--fg);color:var(--bg);}
.nav-bar{display:flex;border-top:1px solid var(--border);margin:0 -16px;overflow-x:auto;scrollbar-width:none;}
.nav-bar::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:10px 12px;font-size:11px;font-weight:600;color:var(--fg3);letter-spacing:.04em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-btn.active{color:var(--fg);border-bottom-color:var(--fg);}

/* MAIN */
#main{padding:20px 16px 100px;max-width:680px;margin:0 auto;}
.fade{animation:fadeIn .2s ease;}
.section-label{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{background:#fff;color:var(--fg2);border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
.chip.active{background:var(--fg);color:var(--bg);border-color:var(--fg);}
.chip:active{opacity:.7;}
.btn-primary{background:var(--fg);color:var(--bg);border-radius:var(--r);padding:13px 20px;font-size:14px;font-weight:600;transition:opacity .15s;width:100%;}
.btn-primary:disabled{opacity:.4;}
.btn-secondary{background:#fff;color:var(--fg2);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 16px;font-size:13px;font-weight:500;transition:all .15s;}
.btn-ghost{background:transparent;color:var(--fg3);padding:6px 10px;font-size:13px;border-radius:6px;transition:all .15s;}
.btn-ghost:hover{color:var(--fg);background:var(--bg2);}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid #fadbd8;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;}
.btn-danger:active{background:#fadbd8;}
.btn-info{background:transparent;color:var(--info);border:1.5px solid #d6eaf8;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;}
.btn-info:active{background:#d6eaf8;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.spacer{height:16px;}

/* CAPTURE */
.capture-textarea{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);color:var(--fg);padding:14px 16px;font-size:15px;line-height:1.7;min-height:140px;transition:border-color .15s;display:block;}
.capture-textarea:focus{border-color:var(--fg);}
.capture-textarea::placeholder{color:var(--fg3);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;}
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.toggle{width:44px;height:26px;background:var(--bg3);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;border:none;}
.toggle.on{background:var(--fg);}
.toggle-knob{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle.on .toggle-knob{left:21px;}
.toggle-label{font-size:14px;font-weight:500;color:var(--fg2);}
.queue-notice{background:#fff3cd;border:1.5px solid #ffc107;border-radius:var(--r);padding:10px 14px;font-size:13px;color:#856404;display:flex;align-items:center;gap:8px;margin-top:12px;}
.rec-active{background:#fee;border-color:#fadbd8!important;color:var(--danger)!important;}
.rec-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);animation:blink 1s infinite;margin-right:4px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{background:#fff;border-radius:var(--r);border:1.5px solid var(--border);padding:16px;}
.stat-area{font-size:12px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.stat-num{font-family:var(--serif);font-size:36px;line-height:1;}
.stat-sub{font-size:12px;color:var(--fg3);margin-top:4px;}
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.lang-cell{background:#fff;border-radius:var(--r);border:1.5px solid var(--border);padding:12px 8px;text-align:center;}
.lang-cell.active{border-color:var(--fg);}
.lang-flag{font-size:20px;margin-bottom:4px;}
.lang-count{font-family:var(--serif);font-size:24px;}
.lang-train-count{font-size:11px;color:var(--fg3);margin-top:2px;}
.train-hint-box{background:#fff;border:1.5px solid var(--border);border-left:3px solid var(--fg);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.train-hint-text{font-size:13px;color:var(--fg2);line-height:1.6;margin-bottom:10px;}

/* THOUGHTS */
.thought-row{background:#fff;border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:8px;overflow:hidden;}
.thought-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;}
.thought-header:active{background:var(--bg);}
.thought-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px;}
.tag-area{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.06em;}
.tag-train{font-size:10px;font-weight:700;color:var(--warn);background:#fef3e2;border-radius:4px;padding:1px 6px;}
.tag-pending{font-size:10px;color:var(--fg3);display:flex;align-items:center;gap:3px;}
.tag-todos{font-size:11px;color:var(--fg3);background:var(--bg2);border-radius:4px;padding:1px 7px;}
.thought-title{font-size:15px;font-weight:600;line-height:1.4;}
.thought-date{font-size:11px;color:var(--fg3);margin-top:2px;}
.chevron{color:var(--fg3);font-size:12px;margin-left:8px;flex-shrink:0;margin-top:2px;}
.thought-body{padding:0 16px 16px;border-top:1px solid var(--border);}
.thought-summary{font-size:14px;color:var(--fg2);line-height:1.7;padding-top:14px;}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.tag-item{font-size:11px;color:var(--fg3);background:var(--bg2);border-radius:4px;padding:2px 8px;}
.feedback-box{background:var(--bg);border:1.5px solid var(--border);border-left:3px solid var(--fg);border-radius:var(--r);padding:14px;margin-top:14px;}
.feedback-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.feedback-title{font-size:11px;font-weight:700;color:var(--fg2);text-transform:uppercase;letter-spacing:.08em;}
.score-bar{display:flex;gap:3px;}
.score-cell{width:22px;height:22px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--fg3);}
.score-cell.active{background:var(--fg);color:var(--bg);border-color:var(--fg);}
.correction{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.correction:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.corr-line{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
.corr-orig{font-size:13px;color:var(--fg3);text-decoration:line-through;}
.corr-new{font-size:13px;font-weight:600;}
.corr-note{font-size:12px;color:var(--fg2);line-height:1.5;}
.natural-box{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.natural-label{font-size:10px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.natural-text{font-size:13px;color:var(--fg2);font-style:italic;line-height:1.6;}
.encourage-text{font-size:12px;color:var(--success);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}

/* TODOS */
.todo-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:500px){.todo-cols{grid-template-columns:1fr;}}
.col-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding-bottom:10px;margin-bottom:8px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.col-count{font-size:11px;color:var(--fg3);font-weight:400;}
.todo-card{background:#fff;border-radius:var(--r);border:1.5px solid var(--border);padding:12px;margin-bottom:6px;cursor:pointer;}
.todo-area-tag{font-size:10px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.todo-text{font-size:13px;line-height:1.4;font-weight:500;}
.todo-text.done{color:var(--fg3);text-decoration:line-through;}
.progress-wrap{margin-top:8px;}
.progress-steps-label{font-size:11px;color:var(--fg3);margin-bottom:4px;}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--fg);border-radius:2px;transition:width .3s;}
.progress-fill.done{background:var(--fg3);}
.todo-detail{padding-top:10px;border-top:1px solid var(--border);margin-top:10px;}
.step-row{display:flex;gap:10px;align-items:flex-start;padding:6px 0;cursor:pointer;}
.step-check{width:18px;height:18px;flex-shrink:0;border:2px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;}
.step-check.done{background:var(--fg);border-color:var(--fg);}
.step-check-mark{color:#fff;font-size:10px;font-weight:700;}
.step-label{font-size:13px;color:var(--fg2);line-height:1.5;}
.step-label.done{color:var(--fg3);text-decoration:line-through;}
.todo-action-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.status-btn{font-size:11px;font-weight:500;color:var(--fg2);background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--fg3);}
.empty-icon{font-size:32px;margin-bottom:10px;}
.empty-text{font-size:14px;}

/* FILES TAB */
.file-card{background:#fff;border-radius:var(--r);border:1.5px solid var(--border);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.file-icon{font-size:28px;flex-shrink:0;width:36px;text-align:center;}
.file-info{flex:1;min-width:0;}
.file-name{font-size:14px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-meta{font-size:11px;color:var(--fg3);margin-top:3px;}
.file-area-tag{font-size:10px;font-weight:600;color:var(--fg3);background:var(--bg2);border-radius:4px;padding:1px 6px;margin-top:4px;display:inline-block;}
.file-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.link-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--fg);padding:10px 14px;font-size:13px;}
.link-input:focus{border-color:var(--fg);}
#file-upload-input{display:none;}

/* CLAUDE CHAT */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 160px);max-height:600px;}
.chat-messages{flex:1;overflow-y:auto;padding:4px 0 16px;}
.chat-bubble{max-width:88%;padding:10px 14px;border-radius:12px;margin-bottom:8px;font-size:14px;line-height:1.6;}
.chat-bubble.user{background:var(--fg);color:var(--bg);margin-left:auto;border-radius:12px 12px 2px 12px;}
.chat-bubble.assistant{background:#fff;border:1.5px solid var(--border);margin-right:auto;border-radius:12px 12px 12px 2px;}
.chat-bubble.thinking{background:var(--bg2);color:var(--fg3);font-style:italic;}
.chat-input-row{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border);}
.chat-input{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);color:var(--fg);padding:11px 14px;font-size:14px;line-height:1.5;max-height:120px;overflow-y:auto;}
.chat-input:focus{border-color:var(--fg);}
.chat-send-btn{background:var(--fg);color:var(--bg);border-radius:var(--r);padding:11px 16px;font-size:18px;flex-shrink:0;transition:opacity .15s;}
.chat-send-btn:disabled{opacity:.4;}
.chat-context-bar{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--fg2);display:flex;align-items:center;justify-content:space-between;}
.chat-context-label{font-weight:600;}
.quick-prompts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.quick-prompt{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--fg2);}
.quick-prompt:active{background:var(--fg2);color:#fff;}

/* SETTINGS */
.area-manage-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#fff;border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:6px;}
.area-name{font-size:14px;font-weight:500;}
.add-area-row{display:flex;gap:8px;margin-top:10px;}
.add-area-input{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);color:var(--fg);padding:11px 14px;font-size:14px;}
.add-area-input:focus{border-color:var(--fg);}
.add-area-btn{background:var(--fg);color:var(--bg);border-radius:var(--r);padding:11px 18px;font-size:18px;font-weight:600;}
</style>
</head>
<body>
<div id="setup">
  <div class="setup-title">Tamis OS</div>
  <div class="setup-sub">Personal Assistant · Einmalige Einrichtung</div>
  <div class="setup-card">
    <div class="setup-label">Anthropic API Key</div>
    <input type="password" id="api-key-input" class="setup-input" placeholder="sk-ant-api03-...">
    <div class="setup-hint">Deinen Key findest du unter <strong>console.anthropic.com</strong> → API Keys.<br>Er wird nur lokal auf diesem Gerät gespeichert.</div>
    <button class="setup-btn" onclick="saveApiKey()">Speichern &amp; Starten</button>
    <div id="setup-error"></div>
  </div>
</div>
<div id="offline-bar">⚡ Offline — Gedanken werden gespeichert und verarbeitet wenn du wieder online bist</div>
<div id="toast"></div>
<input type="file" id="file-upload-input" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" multiple>
<div id="header">
  <div class="header-top">
    <div class="brand">Tamis OS</div>
    <div class="lang-bar">
      <button class="lang-btn active" onclick="setLang('de')">DE</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('el')">ΕΛ</button>
      <button class="lang-btn" onclick="setLang('es')">ES</button>
    </div>
  </div>
  <div class="nav-bar">
    <button class="nav-btn active" id="nav-capture" onclick="setView('capture')">Capture</button>
    <button class="nav-btn" id="nav-thoughts" onclick="setView('thoughts')">Gedanken</button>
    <button class="nav-btn" id="nav-todos" onclick="setView('todos')">Todos</button>
    <button class="nav-btn" id="nav-files" onclick="setView('files')">Dateien</button>
    <button class="nav-btn" id="nav-claude" onclick="setView('claude')">Claude</button>
    <button class="nav-btn" id="nav-settings" onclick="setView('settings')">Bereiche</button>
  </div>
</div>
<div id="main"></div>

<script>
const DEFAULT_AREAS=[{id:'skaipitch',label:'SkaiPitch'},{id:'pinkpudel',label:'Pink Pudel'},{id:'privat',label:'Privat'},{id:'fitness',label:'Fitness'}];
const LANGS=[{id:'de',label:'DE',full:'Deutsch',locale:'de-DE',flag:'🇩🇪'},{id:'en',label:'EN',full:'English',locale:'en-US',flag:'🇬🇧'},{id:'el',label:'ΕΛ',full:'Ελληνικά',locale:'el-GR',flag:'🇬🇷'},{id:'es',label:'ES',full:'Español',locale:'es-ES',flag:'🇪🇸'}];
const UI={

let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('TamisOS',1);r.onupgradeneeded=e=>{e.target.result.createObjectStore('files',{keyPath:'id'});};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=()=>rej();});}
function dbSaveFile(id,blob){return new Promise((res,rej)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').put({id,blob});tx.oncomplete=()=>res();tx.onerror=()=>rej();});}
function dbGetFile(id){return new Promise((res,rej)=>{const tx=db.transaction('files','readonly');const req=tx.objectStore('files').get(id);req.onsuccess=()=>res(req.result?.blob);req.onerror=()=>rej();});}
function dbDeleteFile(id){return new Promise((res,rej)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej();});}

// CLAUDE API
async function callClaude(raw,area,langId,trainMode,targetLang){
  const aLabel=state.areas.find(a=>a.id===area)?.label||area;
  const langFull=LANGS.find(l=>l.id===langId)?.full||'Deutsch';
  const targetFull=LANGS.find(l=>l.id===targetLang)?.full||langFull;
  const prompt=trainMode
    ?`You are a personal assistant and language coach. User wrote in ${langFull} as language practice. Target: ${targetFull}. Area: ${aLabel}.\nInput: "${raw}"\nRespond ONLY with JSON (no markdown):\n{"title":"max 7 words in ${langFull}","summary":"2-3 sentences in ${langFull}","tags":["tag"],"todos":[{"text":"task","steps":["step"]}],"languageFeedback":{"score":"A or B or C or D","corrections":[{"original":"x","corrected":"y","explanation":"note"}],"naturalAlternative":"in ${targetFull}","encouragement":"1 sentence"}}`
    :`You are a personal assistant. Language: ${langFull}. Area: ${aLabel}.\nInput: "${raw}"\nRespond ONLY with JSON (no markdown):\n{"title":"max 7 words in ${langFull}","summary":"2-3 sentences in ${langFull}","tags":["tag"],"todos":[{"text":"task","steps":["step"]}]}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
  if(!res.ok)throw new Error('API '+res.status);
  const d=await res.json();
  const t=d.content?.map(i=>i.text||'').join('')||'{}';
  try{return JSON.parse(t.replace(/```json|```/g,'').trim());}catch{return{title:'...',summary:raw,tags:[],todos:[]};}
}

async function callClaudeChat(messages){
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:'You are Tamis\'s personal assistant. Be concise, practical, and helpful. Respond in the same language the user writes in.',messages})});
  if(!res.ok)throw new Error('API '+res.status);
  const d=await res.json();
  return d.content?.map(i=>i.text||'').join('')||'...';
}

// QUEUE
async function processQueue(){
  if(!state.online||!state.data.queue||state.data.queue.length===0)return;
  const item=state.data.queue[0];
  try{
    const r=await callClaude(item.raw,item.area,item.lang,item.trainMode,item.targetLang);
    const idx=state.data.thoughts.findIndex(t=>t.id===item.thoughtId);
    if(idx!==-1){state.data.thoughts[idx].title=r.title||state.data.thoughts[idx].title;state.data.thoughts[idx].summary=r.summary||item.raw;state.data.thoughts[idx].tags=r.tags||[];state.data.thoughts[idx].languageFeedback=r.languageFeedback||null;state.data.thoughts[idx].pending=false;}
    const todos=(r.todos||[]).map((t,i)=>({id:item.thoughtId+'_q'+i,thoughtId:item.thoughtId,area:item.area,lang:item.lang,text:t.text,steps:(t.steps||[]).map(s=>({text:s,done:false})),status:'open',createdAt:new Date().toISOString()}));
    state.data.todos.push(...todos);state.data.queue.shift();saveData();toast('✓ '+(state.data.thoughts[idx]?.title||''));render();
    if(state.data.queue.length>0)setTimeout(processQueue,1200);
  }catch(e){console.log('Queue retry',e);}
}

// CAPTURE
async function capture(){
  const ta=document.getElementById('ct');
  const raw=ta?ta.value.trim():'';
  if(!raw)return;
  const tid=Date.now().toString();
  const thought={id:tid,area:state.area,lang:state.lang,trainMode:state.trainMode,raw,title:raw.slice(0,50)+(raw.length>50?'...':''),summary:'',tags:[],languageFeedback:null,pending:true,createdAt:new Date().toISOString()};
  state.data.thoughts.unshift(thought);
  if(ta)ta.value='';
  if(state.online){
    state.processing=true;render();
    try{
      const r=await callClaude(raw,state.area,state.lang,state.trainMode,state.targetLang);
      const idx=state.data.thoughts.findIndex(t=>t.id===tid);
      if(idx!==-1){state.data.thoughts[idx].title=r.title||thought.title;state.data.thoughts[idx].summary=r.summary||raw;state.data.thoughts[idx].tags=r.tags||[];state.data.thoughts[idx].languageFeedback=r.languageFeedback||null;state.data.thoughts[idx].pending=false;}
      const todos=(r.todos||[]).map((t,i)=>({id:tid+'_'+i,thoughtId:tid,area:state.area,lang:state.lang,text:t.text,steps:(t.steps||[]).map(s=>({text:s,done:false})),status:'open',createdAt:new Date().toISOString()}));
      state.data.todos.push(...todos);toast('✓ '+r.title);
    }catch(e){state.data.queue.push({thoughtId:tid,raw,area:state.area,lang:state.lang,trainMode:state.trainMode,targetLang:state.targetLang});toast('Gespeichert — wird verarbeitet wenn online');}
    state.processing=false;
  }else{
    if(!state.data.queue)state.data.queue=[];
    state.data.queue.push({thoughtId:tid,raw,area:state.area,lang:state.lang,trainMode:state.trainMode,targetLang:state.targetLang});
    toast('Offline gespeichert ('+state.data.queue.length+' in Warteschlange)');
  }
  saveData();render();
}

// REC
let recRef=null;
function toggleRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Spracherkennung nicht verfügbar');return;}
  if(state.recording){recRef?.stop();state.recording=false;render();return;}
  const r=new SR();r.lang=LANGS.find(l=>l.id===state.lang)?.locale||'de-DE';r.continuous=true;r.interimResults=true;
  r.onresult=e=>{const ta=document.getElementById('ct');if(ta)ta.value=Array.from(e.results).map(x=>x[0].transcript).join(' ');};
  r.onerror=e=>{toast('Mikrofon: '+e.error);state.recording=false;render();};
  r.onend=()=>{state.recording=false;render();};
  r.start();recRef=r;state.recording=true;render();
}

// CHAT
async function sendChat(msg){
  if(!msg.trim()||state.chatSending)return;
  const T=UI[state.lang];
  let userContent=msg.trim();
  if(state.chatContext){
    const t=state.data.thoughts.find(x=>x.id===state.chatContext);
    if(t)userContent=`[Kontext: "${t.title}" — ${t.summary||t.raw}]\n\n${userContent}`;
  }
  state.chatMessages.push({role:'user',content:msg.trim(),display:msg.trim()});
  state.chatMessages.push({role:'assistant',content:'...',thinking:true});
  state.chatSending=true;render();
  try{
    const msgs=state.chatMessages.filter(m=>!m.thinking).map(m=>({role:m.role,content:m.role==='user'&&m===state.chatMessages.filter(x=>!x.thinking).slice(-1)[0]?userContent:m.content}));
    const reply=await callClaudeChat(msgs);
    state.chatMessages=state.chatMessages.filter(m=>!m.thinking);
    state.chatMessages.push({role:'assistant',content:reply});
    saveChat();
  }catch(e){
    state.chatMessages=state.chatMessages.filter(m=>!m.thinking);
    state.chatMessages.push({role:'assistant',content:'Fehler: '+e.message});
  }
  state.chatSending=false;render();
  setTimeout(()=>{const el2=document.getElementById('chat-messages');if(el2)el2.scrollTop=el2.scrollHeight;},50);
}

// FILES
function fileIcon(type,name){
  if(type==='link')return'🔗';
  const ext=(name||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(ext))return'🖼️';
  if(ext==='pdf')return'📄';
  if(['doc','docx'].includes(ext))return'📝';
  if(['xls','xlsx'].includes(ext))return'📊';
  return'📎';
}
function formatBytes(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}

async function handleFileUpload(files){
  for(const file of Array.from(files)){
    const id='file_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const isImage=file.type.startsWith('image/');
    const meta={id,name:file.name,type:'local',mimeType:file.type,size:file.size,area:state.area,createdAt:new Date().toISOString(),isImage};
    try{
      await dbSaveFile(id,file);
      state.files.unshift(meta);saveFiles();
      toast('✓ '+file.name);
    }catch(e){toast('Fehler beim Speichern: '+file.name);}
  }
  render();
}

    if(!blob){toast('Datei nicht gefunden');return;}
    const url=URL.createObjectURL(blob);

  }catch(e){toast('Fehler beim Öffnen');}
}

// DOM HELPER
function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')e.className=v;
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2),v);
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else e.setAttribute(k,v);
  }
  for(const c of kids.flat()){if(c==null||c===false)continue;e.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return e;
}

  const T=UI[state.lang];

  document.getElementById('nav-settings').textContent=T.settings;
  ['capture','thoughts','todos','files','claude','settings'].forEach(v=>document.getElementById('nav-'+v).classList.toggle('active',state.view===v));
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',!!LANGS.find(l=>l.label===b.textContent&&l.id===state.lang)));
  const wrap=el('div',{class:'fade'});
  if(state.view==='capture')wrap.appendChild(renderCapture(T,qCount));
  else if(state.view==='thoughts')wrap.appendChild(renderThoughts(T));
  else if(state.view==='todos')wrap.appendChild(renderTodos(T));
  else if(state.view==='files')wrap.appendChild(renderFiles(T));
  else if(state.view==='claude')wrap.appendChild(renderClaude(T));
  else wrap.appendChild(renderSettings(T));
  main.appendChild(wrap);
}

// CAPTURE VIEW
function renderCapture(T,qCount){
  const f=document.createDocumentFragment();
  f.appendChild(el('div',{class:'section-label'},T.area));
  const cr=el('div',{class:'chip-row'});
  for(const a of state.areas)cr.appendChild(el('button',{class:'chip'+(state.area===a.id?' active':''),onclick:()=>setArea(a.id)},a.label));
  f.appendChild(cr);f.appendChild(el('div',{class:'spacer'}));
  const tr=el('div',{class:'toggle-row'});
  const tw=el('div',{class:'toggle-wrap'});
  const tog=el('button',{class:'toggle'+(state.trainMode?' on':''),onclick:toggleTrainMode});
  tog.appendChild(el('span',{class:'toggle-knob'}));tw.appendChild(tog);tw.appendChild(el('span',{class:'toggle-label'},T.trainMode));tr.appendChild(tw);f.appendChild(tr);
  if(state.trainMode){
    f.appendChild(el('div',{class:'spacer'}));
    const hint=el('div',{class:'train-hint-box'});
    hint.appendChild(el('div',{class:'train-hint-text'},T.trainHint));
    const tlr=el('div',{class:'chip-row'});
    for(const l of LANGS.filter(x=>x.id!==state.lang))tlr.appendChild(el('button',{class:'chip'+(state.targetLang===l.id?' active':''),onclick:()=>setTargetLang(l.id)},l.flag+' '+l.label));
    hint.appendChild(tlr);f.appendChild(hint);
  }
  f.appendChild(el('div',{class:'spacer'}));
  const ta=el('textarea',{id:'ct',class:'capture-textarea',rows:'6',placeholder:state.trainMode?(state.lang==='de'?'Schreibe auf '+LANGS.find(l=>l.id===state.targetLang)?.full+'...':'Write in '+LANGS.find(l=>l.id===state.targetLang)?.full+'...'):(state.lang==='de'?'Gedanken, Ideen, Aufgaben...':state.lang==='en'?'Thoughts, ideas, tasks...':state.lang==='el'?'Σκεψεις, ιδεες, εργασιες...':'Pensamientos, ideas, tareas...')});
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))capture();});

function makeTodoCard(todo,s,T,SC){
  const al=state.areas.find(a=>a.id===todo.area);const ll=LANGS.find(l=>l.id===todo.lang);const isOpen=state.openTodo===todo.id;const ds=todo.steps.filter(x=>x.done).length;

  card.appendChild(el('div',{class:'todo-text'+(s==='done'?' done':'')},todo.text));
  if(todo.steps.length>0){const pw=el('div',{class:'progress-wrap'});pw.appendChild(el('div',{class:'progress-steps-label'},ds+'/'+todo.steps.length+' Schritte'));const pb=el('div',{class:'progress-bar'});pb.appendChild(el('div',{class:'progress-fill'+(s==='done'?' done':''),style:{width:(todo.steps.length?ds/todo.steps.length*100:0)+'%'}}));pw.appendChild(pb);card.appendChild(pw);}

    const det=el('div',{class:'todo-detail',onclick:e=>e.stopPropagation()});
    for(let i=0;i<todo.steps.length;i++){const step=todo.steps[i];const sr2=el('div',{class:'step-row',onclick:()=>toggleStep(todo.id,i)});const chk=el('div',{class:'step-check'+(step.done?' done':'')});if(step.done)chk.appendChild(el('span',{class:'step-check-mark'},'✓'));sr2.appendChild(chk);sr2.appendChild(el('span',{class:'step-label'+(step.done?' done':'')},step.text));det.appendChild(sr2);}
    const acts=el('div',{class:'todo-action-row'});

    acts.appendChild(el('button',{class:'btn-danger',style:{marginLeft:'auto'},onclick:()=>delTodo(todo.id)},T.del));det.appendChild(acts);card.appendChild(det);
  }
  return card;
}

// APPLE TOUCH ICON — generated via Canvas for iOS "Add to Home Screen"
function createAppleTouchIcon(){
  try{
    const size=180,r=40;
    const c=document.createElement('canvas');
    c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    // Rounded background
    ctx.fillStyle='#1a1814';
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.arcTo(size,0,size,r,r);ctx.arcTo(size,size,size-r,size,r);ctx.arcTo(0,size,0,size-r,r);ctx.arcTo(0,0,r,0,r);
    ctx.closePath();ctx.fill();
    // T mark scaled from 512→180
    const s=size/512;
    ctx.fillStyle='#f5f4f0';
    ctx.fillRect(80*s,130*s,352*s,56*s);   // horizontal bar
    ctx.fillRect(220*s,168*s,72*s,214*s);  // vertical bar
    let link=document.querySelector('link[rel="apple-touch-icon"]');
    if(!link){link=document.createElement('link');link.rel='apple-touch-icon';document.head.appendChild(link);}
    link.href=c.toDataURL('image/png');
  }catch(e){}
}

// SERVICE WORKER
const SW=`const C='tamis-v4';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname]).catch(()=>{})));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.url.includes('anthropic.com'))return;e.respondWith(caches.match(e.request).then(c=>{if(c)return c;return fetch(e.request).then(r=>{if(r&&r.status===200){const cl=r.clone();caches.open(C).then(ca=>ca.put(e.request,cl));}return r;}).catch(()=>c);}));});`;
function registerSW(){if(!('serviceWorker'in navigator))return;const blob=new Blob([SW],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});}

// INIT
async function init(){
  await openDB();
  state.data=loadData();if(!state.data.queue)state.data.queue=[];
  state.areas=loadAreas();state.files=loadFiles();state.chatMessages=loadChat();
  const p=loadPrefs();
  if(p.lang)state.lang=p.lang;
  if(p.area&&state.areas.find(a=>a.id===p.area))state.area=p.area;else if(state.areas.length)state.area=state.areas[0].id;
  if(p.targetLang)state.targetLang=p.targetLang;if(p.trainMode)state.trainMode=p.trainMode;
  state.online=navigator.onLine;
  if(!state.online)document.getElementById('offline-bar').classList.add('show');
  createAppleTouchIcon();
  registerSW();render();
  if(state.online&&state.data.queue.length>0)setTimeout(processQueue,1000);
}

  if(!key){document.getElementById('setup').classList.remove('hidden');}

});
